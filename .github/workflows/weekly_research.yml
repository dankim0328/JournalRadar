name: Weekly Research & Deploy

on:
  schedule:
    # 매주 월요일 아침 9시(KST) 실행 (UTC 기준 일요일 자정)
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행 허용
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: 주간 논문 수집 & AI 분석 ──
  research:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run research scripts
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        NOTION_FINANCE_PAGE_ID: ${{ secrets.NOTION_FINANCE_PAGE_ID }}
        NOTION_ACCOUNTING_PAGE_ID: ${{ secrets.NOTION_ACCOUNTING_PAGE_ID }}
      run: |
        python marketing_research_assistant.py
        python finance_research_assistant.py
        python accounting_research_assistant.py

    - name: Generate weekly JSON data
      run: |
        python scripts/generate_weekly_json.py

    - name: Commit updated data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add site/public/data/
        git diff --staged --quiet || git commit -m "📊 Weekly data update $(date +'%Y-%m-%d')"
        git push

  # ── Job 2: 사이트 빌드 & 배포 ──
  deploy:
    runs-on: ubuntu-latest
    needs: [research]
    if: always() && !failure() && !cancelled()
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main  # 최신 커밋 포함

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: site/package-lock.json

    - name: Install dependencies
      working-directory: site
      run: npm ci

    - name: Build Next.js static site
      working-directory: site
      env:
        NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site/out

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
