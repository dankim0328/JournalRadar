name: Custom Period Backfill

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: '검색 시작일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-01'
      until_date:
        description: '검색 종료일 (YYYY-MM-DD)'
        required: true
        default: '2026-04-19'
  schedule:
    # 매일 한국 시간 오전 10시(UTC 1시) 자동 실행 (무료 한도 50개 소진 시 자동 종료됨)
    - cron: '0 1 * * *'
  
permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Backfill Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
      run: |
        FROM_DATE="${{ inputs.from_date }}"
        UNTIL_DATE="${{ inputs.until_date }}"
        if [ -z "$FROM_DATE" ]; then FROM_DATE="2026-03-01"; fi
        if [ -z "$UNTIL_DATE" ]; then UNTIL_DATE="2026-04-19"; fi
        echo "Running backfill from $FROM_DATE to $UNTIL_DATE"
        python backfill_custom_period.py --from-date "$FROM_DATE" --until-date "$UNTIL_DATE"
